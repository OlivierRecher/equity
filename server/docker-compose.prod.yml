version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: equity-db-prod
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - equity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - equity_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equity-api-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - equity_network

networks:
  equity_network:
    driver: bridge

volumes:
  equity_pgdata:
